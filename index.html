<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ========== HEADER ========== -->
    <header>
        <h1 id="app-title">Abiotic Almanac</h1>
        <p id="app-subtitle">Abiotic Factor's items</p>
    </header>

    <!-- ========== STATS SECTION ========== -->
    <!-- Use this area to display summary stats about your collection -->
    <section id="stats-section">
        <h2>Stats</h2>
        <div id="stats-display">
            <!-- Your JavaScript will fill this in -->
            <p>Total Items: 0</p>
        </div>
    </section>

    <!-- ========== ADD ITEM FORM ========== -->
    <!-- These inputs let the user add a new item to the collection -->
    <!-- Rename the labels and add/remove inputs to fit YOUR theme -->
    <section id="add-section">
        <h2>Add New Item</h2>
        <div id="form-container">
            <label for="input-item">Item:</label>
            <input type="text" id="input-item" placeholder="Enter item name...">

            <label for="input-category">Category:</label>
            <input type="text" id="input-category" placeholder="Enter category...">

            <label for="input-rating">Rarity:</label>
            <input type="text" id="input-rarity" placeholder="Common, Rare, Unique,etc">

            <label for="input-notes">Notes:</label>
            <input type="text" id="input-notes" placeholder="Any extra info...">

            <button id="add-btn">Add to Collection</button>
        </div>
    </section>

    <!-- ========== SEARCH / FILTER ========== -->
    <section id="search-section">
        <label for="search-input">Search:</label>
        <input type="text" id="search-input" placeholder="Type to search...">
    </section>

    <!-- ========== COLLECTION DISPLAY ========== -->
    <!-- Your JavaScript will build cards/items here -->
    <section id="collection-section">
        <h2>My Items</h2>
        <div id="collection-display">
            <!-- Items will be rendered here by your render function -->
        </div>
    </section>

    <!-- ========== YOUR JAVASCRIPT FILE ========== -->
    <!-- Create an app.js file and link it here -->
    <script src="app.js"></script>

</body>
</html>
